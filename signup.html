<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finance Tracker - Sign Up</title>
    <link rel="stylesheet" href="up.css" />
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <h1 class="logo">Finance Tracker</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="usetracker.html">Use Tracker</a>
          <a href="work.html">How it Works</a>
          <a href="supportpage.html">Support</a>
          <a href="loginfinance.html" class="btn secondary">Login</a>
          <a href="signup.html" class="btn primary">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="auth-container">
      <div class="auth-card">
        <h2>Sign Up</h2>
        <form>
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-icon">
              <ion-icon name="person"></ion-icon>
              <input type="text" id="username" required />
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-icon">
              <ion-icon name="mail"></ion-icon>
              <input type="email" id="email" required />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon">
              <ion-icon name="lock-closed"></ion-icon>
              <input type="password" id="password" required />
            </div>
          </div>
          <div class="form-group checkbox">
            <input type="checkbox" id="terms" required />
            <label for="terms">I agree to the terms & conditions</label>
          </div>
          <button type="submit" class="btn primary">Register</button>
          <p class="switch-auth">
            Already have an account?
            <a href="loginfinance.html">Login</a>
          </p>
        </form>
      </div>
    </main>
  </body>
</html>
