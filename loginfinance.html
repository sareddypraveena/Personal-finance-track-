<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finance Tracker - Login</title>
    <link rel="stylesheet" href="log.css" />
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <h1 class="logo">Finance Tracker</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="usetracker.html">Use Tracker</a>
          <a href="work.html">How it Works</a>
          <a href="supportpage.html">Support</a>
          <a href="loginfinance.html" class="btn secondary">Login</a>
          <a href="signup.html" class="btn primary">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="auth-container">
      <div class="auth-card">
        <h2>Login</h2>
        <form>
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-icon">
              <ion-icon name="mail"></ion-icon>
              <input type="email" id="email" required />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon">
              <ion-icon name="lock-closed"></ion-icon>
              <input type="password" id="password" required />
            </div>
          </div>
          <div class="form-group checkbox">
            <input type="checkbox" id="remember" />
            <label for="remember">Remember me</label>
            <a href="#">Forgot Password?</a>
          </div>
          <button type="submit" class="btn primary">Login</button>
          <p class="switch-auth">
            Don’t have an account? <a href="signup.html">Sign up</a>
          </p>
        </form>
      </div>
    </main>
 <script>
        feather.replace();
      </script>
      <script src="script.js"></script>
      <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
      <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
      <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  </body>
</html>
